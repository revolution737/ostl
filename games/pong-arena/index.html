<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong Arena — ostl.</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    #gameCanvas {
      border: 2px solid rgba(100, 120, 255, 0.3);
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(100, 120, 255, 0.15);
    }
    #waiting {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #8888ff;
      font-size: 18px;
      text-align: center;
      letter-spacing: 2px;
    }
    #waiting .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(100,120,255,0.2);
      border-top-color: #6478ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="waiting">
    <div class="spinner"></div>
    WAITING FOR OPPONENT...
  </div>

  <script>
    // ─── ostl. Bridge (postMessage) ─────────────────────────
    const isEmbedded = window.parent !== window;

    function sendToOpponent(data) {
      if (isEmbedded) {
        window.parent.postMessage(JSON.stringify(data), '*');
      }
    }

    // Incoming opponent data
    let opponentData = null;
    let gameStarted = false;
    let isHost = false; // Host controls ball physics

    window.addEventListener('message', (event) => {
      try {
        const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
        
        if (data.type === 'MOVE') {
          opponentData = data;
        } else if (data.type === 'BALL') {
          // Guest: receive authoritative ball state from host and
          // use velocity for local prediction between updates
          if (!isHost) {
            ball.vx = data.vx;
            ball.vy = data.vy;
            // Smoothly correct position (lerp toward authority)
            ball.targetX = data.x;
            ball.targetY = data.y;
          }
        } else if (data.type === 'SCORE') {
          scores.left = data.left;
          scores.right = data.right;
        } else if (data.type === 'START') {
          gameStarted = true;
          isHost = data.youAreHost === false;
          document.getElementById('waiting').style.display = 'none';
        }
      } catch (e) {}
    });

    // ─── Game Constants ─────────────────────────────────────
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Responsive sizing
    function resize() {
      const maxW = Math.min(window.innerWidth - 40, 800);
      const maxH = Math.min(window.innerHeight - 40, 500);
      const aspect = 800 / 500;
      
      if (maxW / maxH > aspect) {
        canvas.height = maxH;
        canvas.width = maxH * aspect;
      } else {
        canvas.width = maxW;
        canvas.height = maxW / aspect;
      }
    }
    resize();
    window.addEventListener('resize', resize);

    // Game dimensions (logical, always 800x500)
    const W = 800, H = 500;
    const PADDLE_W = 12, PADDLE_H = 90;
    const BALL_R = 8;
    const PADDLE_SPEED = 7;
    const BALL_SPEED = 5;

    // ─── Game State ─────────────────────────────────────────
    const localPaddle = { y: H / 2 - PADDLE_H / 2 };
    const remotePaddle = { y: H / 2 - PADDLE_H / 2 };
    const ball = { x: W / 2, y: H / 2, vx: BALL_SPEED, vy: BALL_SPEED * 0.6, targetX: W/2, targetY: H/2 };
    const scores = { left: 0, right: 0 };

    const keys = {};
    document.addEventListener('keydown', (e) => keys[e.key] = true);
    document.addEventListener('keyup', (e) => keys[e.key] = false);

    // Touch / mouse for mobile
    let touchY = null;
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const scaleY = H / rect.height;
      touchY = (e.touches[0].clientY - rect.top) * scaleY;
    });
    canvas.addEventListener('touchend', () => touchY = null);
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const scaleY = H / rect.height;
      touchY = (e.clientY - rect.top) * scaleY;
    });

    // ─── Auto-start for standalone testing ──────────────────
    if (!isEmbedded) {
      setTimeout(() => {
        gameStarted = true;
        isHost = true;
        document.getElementById('waiting').style.display = 'none';
      }, 500);
    } else {
      sendToOpponent({ type: 'READY' });
      setTimeout(() => {
        if (!gameStarted) {
          gameStarted = true;
          isHost = true;
          document.getElementById('waiting').style.display = 'none';
        }
      }, 3000);
    }

    // ─── Game Loop ──────────────────────────────────────────
    let lastTime = performance.now();
    let lastSend = 0;

    function update(dt) {
      if (!gameStarted) return;

      // dt is in seconds, but our speeds were tuned for 60fps (1/60 = 0.0166)
      // We'll multiply by (dt * 60) to keep the same feel
      const scale = dt * 60;

      // Move local paddle
      if (touchY !== null) {
        const target = touchY - PADDLE_H / 2;
        localPaddle.y += (target - localPaddle.y) * 0.2 * scale;
      } else {
        if (keys['ArrowUp'] || keys['w'] || keys['W']) localPaddle.y -= PADDLE_SPEED * scale;
        if (keys['ArrowDown'] || keys['s'] || keys['S']) localPaddle.y += PADDLE_SPEED * scale;
      }
      localPaddle.y = Math.max(0, Math.min(H - PADDLE_H, localPaddle.y));

      // Smooth remote paddle interpolation
      if (opponentData) {
        remotePaddle.y += (opponentData.y - remotePaddle.y) * 0.3 * scale;
      }

      // Ball physics
      if (isHost) {
        // HOST: full authority over ball
        ball.x += ball.vx * scale;
        ball.y += ball.vy * scale;

        // Top/bottom bounce
        if (ball.y - BALL_R <= 0 || ball.y + BALL_R >= H) {
          ball.vy *= -1;
          ball.y = Math.max(BALL_R, Math.min(H - BALL_R, ball.y));
        }

        // Left paddle collision
        const lp = localPaddle;
        if (ball.x - BALL_R <= 30 + PADDLE_W &&
            ball.x - BALL_R >= 30 &&
            ball.y >= lp.y && ball.y <= lp.y + PADDLE_H) {
          ball.vx = Math.abs(ball.vx);
          const hit = (ball.y - (lp.y + PADDLE_H / 2)) / (PADDLE_H / 2);
          ball.vy = hit * BALL_SPEED;
          ball.vx *= 1.02;
        }

        // Right paddle collision
        const rp = remotePaddle;
        if (ball.x + BALL_R >= W - 30 - PADDLE_W &&
            ball.x + BALL_R <= W - 30 &&
            ball.y >= rp.y && ball.y <= rp.y + PADDLE_H) {
          ball.vx = -Math.abs(ball.vx);
          const hit = (ball.y - (rp.y + PADDLE_H / 2)) / (PADDLE_H / 2);
          ball.vy = hit * BALL_SPEED;
          ball.vx *= 1.02;
        }

        // Score
        if (ball.x < 0) {
          scores.right++;
          resetBall();
          sendToOpponent({ type: 'SCORE', left: scores.left, right: scores.right });
        } else if (ball.x > W) {
          scores.left++;
          resetBall();
          sendToOpponent({ type: 'SCORE', left: scores.left, right: scores.right });
        }
      } else {
        // GUEST: local prediction using velocity + smooth correction from host
        ball.x += ball.vx * scale;
        ball.y += ball.vy * scale;

        // Top/bottom bounce (local prediction)
        if (ball.y - BALL_R <= 0 || ball.y + BALL_R >= H) {
          ball.vy *= -1;
          ball.y = Math.max(BALL_R, Math.min(H - BALL_R, ball.y));
        }

        // Smoothly correct toward host's authoritative position
        if (ball.targetX !== undefined) {
          ball.x += (ball.targetX - ball.x) * 0.15 * scale;
          ball.y += (ball.targetY - ball.y) * 0.15 * scale;
        }
      }

      // Send data (~30fps)
      const now = Date.now();
      if (now - lastSend > 33) {
        sendToOpponent({ type: 'MOVE', y: localPaddle.y });
        if (isHost) {
          sendToOpponent({ type: 'BALL', x: ball.x, y: ball.y, vx: ball.vx, vy: ball.vy });
        }
        lastSend = now;
      }
    }

    function resetBall() {
      ball.x = W / 2;
      ball.y = H / 2;
      ball.vx = (Math.random() > 0.5 ? 1 : -1) * BALL_SPEED;
      ball.vy = (Math.random() - 0.5) * BALL_SPEED;
    }

    // ─── Rendering ──────────────────────────────────────────
    function draw() {
      const scaleX = canvas.width / W;
      const scaleY = canvas.height / H;
      ctx.save();
      ctx.scale(scaleX, scaleY);

      // Background
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(0, 0, W, H);

      // Center line
      ctx.strokeStyle = 'rgba(100, 120, 255, 0.15)';
      ctx.lineWidth = 2;
      ctx.setLineDash([10, 15]);
      ctx.beginPath();
      ctx.moveTo(W / 2, 0);
      ctx.lineTo(W / 2, H);
      ctx.stroke();
      ctx.setLineDash([]);

      // Center circle
      ctx.beginPath();
      ctx.arc(W / 2, H / 2, 60, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(100, 120, 255, 0.1)';
      ctx.lineWidth = 2;
      ctx.stroke();

      if (!gameStarted) {
        ctx.restore();
        return;
      }

      // Paddles
      // Local (left) — cyan glow
      drawPaddle(30, localPaddle.y, '#00e5ff', 'rgba(0, 229, 255, 0.3)');
      // Remote (right) — magenta glow
      drawPaddle(W - 30 - PADDLE_W, remotePaddle.y, '#ff4081', 'rgba(255, 64, 129, 0.3)');

      // Ball
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      // Ball glow
      ctx.shadowColor = '#ffffff';
      ctx.shadowBlur = 20;
      ctx.fill();
      ctx.shadowBlur = 0;

      // Ball trail
      ctx.beginPath();
      ctx.arc(ball.x - ball.vx * 2, ball.y - ball.vy * 2, BALL_R * 0.6, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fill();

      // Scores
      ctx.font = 'bold 64px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(0, 229, 255, 0.4)';
      ctx.fillText(scores.left, W / 2 - 80, 80);
      ctx.fillStyle = 'rgba(255, 64, 129, 0.4)';
      ctx.fillText(scores.right, W / 2 + 80, 80);

      // Labels
      ctx.font = '12px "Courier New", monospace';
      ctx.fillStyle = 'rgba(0, 229, 255, 0.5)';
      ctx.textAlign = 'left';
      ctx.fillText('YOU', 30, H - 15);
      ctx.fillStyle = 'rgba(255, 64, 129, 0.5)';
      ctx.textAlign = 'right';
      ctx.fillText('OPPONENT', W - 30, H - 15);

      ctx.restore();
    }

    function drawPaddle(x, y, color, glow) {
      // Glow
      ctx.shadowColor = glow;
      ctx.shadowBlur = 15;
      ctx.fillStyle = color;
      
      // Rounded paddle
      const r = PADDLE_W / 2;
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + PADDLE_W - r, y);
      ctx.arcTo(x + PADDLE_W, y, x + PADDLE_W, y + r, r);
      ctx.lineTo(x + PADDLE_W, y + PADDLE_H - r);
      ctx.arcTo(x + PADDLE_W, y + PADDLE_H, x + PADDLE_W - r, y + PADDLE_H, r);
      ctx.lineTo(x + r, y + PADDLE_H);
      ctx.arcTo(x, y + PADDLE_H, x, y + PADDLE_H - r, r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x, y, x + r, y, r);
      ctx.fill();
      
      ctx.shadowBlur = 0;
    }

    // ─── Main Loop ──────────────────────────────────────────
    function loop(currentTime) {
      const dt = (currentTime - lastTime) / 1000; // in seconds
      lastTime = currentTime;

      // Limit dt to avoid huge jumps on tab switch/lag
      const clampedDt = Math.min(dt, 0.1); 

      update(clampedDt);
      draw();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame((t) => {
      lastTime = t;
      requestAnimationFrame(loop);
    });
  </script>
</body>
</html>
