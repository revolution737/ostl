<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ostl. matchmaker test</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #fff;
      font-size: 1.4rem;
    }
    h1 span { color: #7c5cfc; }
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .panel {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .panel h2 {
      font-size: 1rem;
      color: #aaa;
      border-bottom: 1px solid #2a2a2a;
      padding-bottom: 8px;
    }
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      background: #7c5cfc;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    button:hover { background: #6a4ce0; }
    button:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }
    .status {
      font-size: 0.8rem;
      padding: 4px 10px;
      border-radius: 6px;
      display: inline-block;
    }
    .status.connected { background: #1a3a1a; color: #4caf50; }
    .status.disconnected { background: #3a1a1a; color: #f44336; }
    .status.matched { background: #1a2a3a; color: #2196f3; }
    .status.webrtc { background: #3a2a1a; color: #ff9800; }
    .log {
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 10px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.75rem;
      height: 260px;
      overflow-y: auto;
      line-height: 1.6;
    }
    .log .entry { padding: 1px 0; }
    .log .time { color: #555; }
    .log .event { color: #7c5cfc; }
    .log .data { color: #888; }
    .log .success { color: #4caf50; }
    .log .error { color: #f44336; }
    .rtc-status {
      font-size: 0.8rem;
      color: #666;
      text-align: center;
      padding: 6px;
      border: 1px dashed #2a2a2a;
      border-radius: 8px;
    }
    .rtc-status.open { border-color: #4caf50; color: #4caf50; }
  </style>
</head>
<body>
  <h1><span>ostl.</span> matchmaker test harness</h1>
  <div class="panels">
    <div class="panel" id="panel-1"></div>
    <div class="panel" id="panel-2"></div>
  </div>

  <script>
    function createPlayer(panelId, label) {
      const panel = document.getElementById(panelId)
      const uuid = crypto.randomUUID()

      let socket = null
      let pc = null           // RTCPeerConnection
      let dc = null           // RTCDataChannel
      let roomId = null
      let isHost = false

      // --- build UI ---
      panel.innerHTML = `
        <h2>${label} <span class="status disconnected" id="${panelId}-status">disconnected</span></h2>
        <div style="font-size:0.75rem;color:#555;">UUID: ${uuid}</div>
        <div class="controls">
          <button id="${panelId}-connect">Connect</button>
          <button id="${panelId}-find" disabled>Find Match</button>
          <button id="${panelId}-send" disabled>Send Test Message</button>
          <button id="${panelId}-end" disabled>End Match</button>
        </div>
        <div class="rtc-status" id="${panelId}-rtc">WebRTC: not connected</div>
        <div class="log" id="${panelId}-log"></div>
      `

      const statusEl = document.getElementById(`${panelId}-status`)
      const rtcEl = document.getElementById(`${panelId}-rtc`)
      const logEl = document.getElementById(`${panelId}-log`)
      const connectBtn = document.getElementById(`${panelId}-connect`)
      const findBtn = document.getElementById(`${panelId}-find`)
      const sendBtn = document.getElementById(`${panelId}-send`)
      const endBtn = document.getElementById(`${panelId}-end`)

      function log(event, data, type = '') {
        const time = new Date().toLocaleTimeString()
        const entry = document.createElement('div')
        entry.className = 'entry'
        entry.innerHTML = `<span class="time">${time}</span> <span class="event">${event}</span> <span class="${type || 'data'}">${data || ''}</span>`
        logEl.appendChild(entry)
        logEl.scrollTop = logEl.scrollHeight
      }

      // --- Connect ---
      connectBtn.addEventListener('click', () => {
        socket = io()

        socket.on('connect', () => {
          log('connected', socket.id, 'success')
          statusEl.textContent = 'connected'
          statusEl.className = 'status connected'
          connectBtn.disabled = true
          findBtn.disabled = false

          // register UUID
          socket.emit('register', { uuid })
          log('register', uuid)
        })

        socket.on('disconnect', () => {
          log('disconnected', '', 'error')
          statusEl.textContent = 'disconnected'
          statusEl.className = 'status disconnected'
          connectBtn.disabled = false
          findBtn.disabled = true
          sendBtn.disabled = true
          endBtn.disabled = true
        })

        // --- Match Found ---
        socket.on('match_found', (data) => {
          roomId = data.roomId
          isHost = data.isHost
          log('match_found', `room: ${roomId}, isHost: ${isHost}`, 'success')
          statusEl.textContent = `matched (${isHost ? 'host' : 'guest'})`
          statusEl.className = 'status matched'
          findBtn.disabled = true
          endBtn.disabled = false

          // start WebRTC
          setupWebRTC()
        })

        // --- Signaling ---
        socket.on('receive_offer', async ({ offer }) => {
          log('receive_offer', 'received', 'event')
          await pc.setRemoteDescription(new RTCSessionDescription(offer))
          const answer = await pc.createAnswer()
          await pc.setLocalDescription(answer)
          socket.emit('send_answer', { roomId, answer })
          log('send_answer', 'sent', 'event')
        })

        socket.on('receive_answer', async ({ answer }) => {
          log('receive_answer', 'received', 'event')
          await pc.setRemoteDescription(new RTCSessionDescription(answer))
        })

        socket.on('receive_ice_candidate', async ({ candidate }) => {
          log('receive_ice', 'received', 'data')
          try {
            await pc.addIceCandidate(new RTCIceCandidate(candidate))
          } catch (e) {
            log('ice_error', e.message, 'error')
          }
        })

        // --- Opponent Disconnected ---
        socket.on('opponent_disconnected', ({ roomId: r }) => {
          log('opponent_disconnected', `room: ${r}`, 'error')
          cleanup()
        })

        // --- Rejoin ---
        socket.on('rejoin', ({ roomId: r }) => {
          roomId = r
          log('rejoin', `rejoined room: ${r}`, 'success')
          statusEl.textContent = 'rejoined'
          statusEl.className = 'status matched'
          endBtn.disabled = false
        })
      })

      // --- Find Match ---
      findBtn.addEventListener('click', () => {
        socket.emit('find_match', { gameId: 'bomberman' })
        log('find_match', 'gameId: bomberman')
        findBtn.disabled = true
      })

      // --- Send Test Message ---
      sendBtn.addEventListener('click', () => {
        if (dc && dc.readyState === 'open') {
          const msg = `hello from ${label} @ ${new Date().toLocaleTimeString()}`
          dc.send(msg)
          log('dc_send', msg, 'success')
        }
      })

      // --- End Match ---
      endBtn.addEventListener('click', () => {
        socket.emit('match_ended', { roomId })
        log('match_ended', `room: ${roomId}`)
        cleanup()
      })

      // --- WebRTC Setup ---
      function setupWebRTC() {
        pc = new RTCPeerConnection({
          iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        })

        pc.onicecandidate = (e) => {
          if (e.candidate) {
            socket.emit('ice_candidate', { roomId, candidate: e.candidate })
            log('ice_send', 'sent candidate', 'data')
          }
        }

        pc.onconnectionstatechange = () => {
          log('rtc_state', pc.connectionState)
          if (pc.connectionState === 'connected') {
            rtcEl.textContent = 'WebRTC: connected ✓'
            rtcEl.className = 'rtc-status open'
          }
        }

        if (isHost) {
          // host creates data channel and offer
          dc = pc.createDataChannel('game')
          setupDataChannel(dc)

          pc.createOffer().then(offer => {
            pc.setLocalDescription(offer)
            socket.emit('send_offer', { roomId, offer })
            log('send_offer', 'sent', 'event')
          })
        } else {
          // guest waits for data channel
          pc.ondatachannel = (e) => {
            dc = e.channel
            setupDataChannel(dc)
          }
        }
      }

      function setupDataChannel(channel) {
        channel.onopen = () => {
          log('datachannel', 'open', 'success')
          sendBtn.disabled = false
          rtcEl.textContent = 'WebRTC: data channel open ✓'
          rtcEl.className = 'rtc-status open'
        }
        channel.onmessage = (e) => {
          log('dc_recv', e.data, 'success')
        }
        channel.onclose = () => {
          log('datachannel', 'closed', 'error')
          sendBtn.disabled = true
        }
      }

      function cleanup() {
        if (dc) dc.close()
        if (pc) pc.close()
        dc = null
        pc = null
        roomId = null
        isHost = false
        sendBtn.disabled = true
        endBtn.disabled = true
        findBtn.disabled = false
        statusEl.textContent = 'connected'
        statusEl.className = 'status connected'
        rtcEl.textContent = 'WebRTC: not connected'
        rtcEl.className = 'rtc-status'
      }
    }

    // initialize both panels
    createPlayer('panel-1', 'Player 1')
    createPlayer('panel-2', 'Player 2')
  </script>
</body>
</html>
