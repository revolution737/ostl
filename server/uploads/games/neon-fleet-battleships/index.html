<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Fleet: Battleships — ostl.</title>
  <style>
    :root {
      --bg: #050510;
      --panel: #0a0a20;
      --primary: #00f2ff;
      --secondary: #ff007b;
      --grid: rgba(0, 242, 255, 0.1);
      --font: 'Segoe UI', system-ui, sans-serif;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: white;
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    #ui {
      width: 100%;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      z-index: 10;
    }

    .status-pill {
      padding: 6px 16px;
      border-radius: 20px;
      background: var(--panel);
      border: 1px solid var(--primary);
      box-shadow: 0 0 15px var(--grid);
      font-weight: 800;
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    #game-container {
      flex: 1;
      display: flex;
      gap: 40px;
      padding: 40px;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .board-container {
      text-align: center;
    }

    .board-title {
      font-size: 12px;
      color: var(--primary);
      margin-bottom: 15px;
      letter-spacing: 2px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(10, 30px);
      grid-template-rows: repeat(10, 30px);
      gap: 2px;
      background: var(--grid);
      padding: 2px;
      border: 1px solid rgba(0, 242, 255, 0.3);
      position: relative;
    }

    .cell {
      width: 30px;
      height: 30px;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: crosshair;
      transition: all 0.2s;
      font-size: 10px;
    }

    .cell:hover {
      background: rgba(0, 242, 255, 0.1);
      box-shadow: inset 0 0 10px var(--primary);
    }

    .cell.ship { background: #1a1a40; border: 1px solid var(--primary); }
    .cell.hit { background: var(--secondary); box-shadow: 0 0 15px var(--secondary); }
    .cell.miss { background: #333; }

    #waiting {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100;
    }

    .scanner {
      width: 100px; height: 100px;
      border-radius: 50%;
      border: 2px solid var(--primary);
      position: relative;
      margin-bottom: 20px;
      overflow: hidden;
      box-shadow: 0 0 20px var(--primary);
    }

    .scanner::after {
      content: '';
      position: absolute; width: 50%; height: 50%;
      background: conic-gradient(from 0deg, var(--primary), transparent);
      top: 0; left: 0; transform-origin: 100% 100%;
      animation: scan 2s linear infinite;
    }

    @keyframes scan { to { transform: rotate(360deg); } }

  </style>
</head>
<body>

  <div id="waiting">
    <div class="scanner"></div>
    <p>ESTABLISHING SECURE COMMS...</p>
  </div>

  <div id="ui">
    <div class="status-pill" id="turn-indicator">System Booting...</div>
    <div id="score" style="font-weight: 900;">ENEMY SHIPS LEFT: 5</div>
  </div>

  <div id="game-container">
    <div class="board-container">
      <div class="board-title">My Waters</div>
      <div id="my-grid" class="grid"></div>
    </div>
    <div class="board-container">
      <div class="board-title">Tactical Map (Attack)</div>
      <div id="enemy-grid" class="grid"></div>
    </div>
  </div>

  <script>
    // ─── Bridge ──────────────────────────────────────────────
    const isEmbedded = window.parent !== window;
    function send(data) {
      if (isEmbedded) window.parent.postMessage(JSON.stringify(data), '*');
    }

    let isHost = false;
    let myTurn = false;
    let gameReady = false;

    // ─── Game State ──────────────────────────────────────────
    const SIZE = 10;
    const myShips = new Set();
    const enemyHits = new Set();
    const enemyMisses = new Set();
    const myHits = new Set();
    const myMisses = new Set();

    // Random ship placement (5 ships)
    while(myShips.size < 5) {
      myShips.add(Math.floor(Math.random() * 100));
    }

    function initGrids() {
      const myGrid = document.getElementById('my-grid');
      const enemyGrid = document.getElementById('enemy-grid');

      for(let i=0; i<100; i++) {
        const myCell = document.createElement('div');
        myCell.className = 'cell' + (myShips.has(i) ? ' ship' : '');
        myCell.id = `my-${i}`;
        myGrid.appendChild(myCell);

        const enemyCell = document.createElement('div');
        enemyCell.className = 'cell';
        enemyCell.id = `enemy-${i}`;
        enemyCell.onclick = () => fireAt(i);
        enemyGrid.appendChild(enemyCell);
      }
    }

    function fireAt(index) {
      if (!myTurn || !gameReady) return;
      if (myHits.has(index) || myMisses.has(index)) return;

      send({ type: 'ATTACK', index });
      myTurn = false;
      updateStatus();
    }

    window.addEventListener('message', (event) => {
      const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;

      if (data.type === 'START') {
        isHost = !data.youAreHost; // If we receive "youAreHost: false", we are Host
        myTurn = isHost;
        gameReady = true;
        document.getElementById('waiting').style.display = 'none';
        updateStatus();
      }

      if (data.type === 'ATTACK') {
        const isHit = myShips.has(data.index);
        const cell = document.getElementById(`my-${data.index}`);
        cell.className = 'cell ' + (isHit ? 'hit' : 'miss');
        
        send({ 
          type: 'RESULT', 
          index: data.index, 
          isHit: isHit,
          source: 'response'
        });
        
        myTurn = true;
        updateStatus();
      }

      if (data.type === 'RESULT') {
        const cell = document.getElementById(`enemy-${data.index}`);
        if (data.isHit) {
          cell.className = 'cell hit';
          myHits.add(data.index);
        } else {
          cell.className = 'cell miss';
          myMisses.add(data.index);
        }
        updateScore();
      }
    });

    function updateStatus() {
      const pill = document.getElementById('turn-indicator');
      pill.innerText = myTurn ? "Your Turn: Fire!" : "Enemy Turn: Tactical Silence";
      pill.style.borderColor = myTurn ? 'var(--primary)' : 'var(--secondary)';
    }

    function updateScore() {
      document.getElementById('score').innerText = `ENEMY SHIPS LEFT: ${5 - myHits.size}`;
      if (myHits.size >= 5) {
        alert("ENEMEY FLEET DESTROYED!");
      }
    }

    initGrids();
    if (isEmbedded) send({ type: 'READY' });
    else {
      // Direct testing
      gameReady = true;
      myTurn = true;
      document.getElementById('waiting').style.display = 'none';
      updateStatus();
    }
  </script>
</body>
</html>
