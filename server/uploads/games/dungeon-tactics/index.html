<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dungeon Grid Tactics</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

  :root {
    --stone: #1a1510;
    --stone2: #231d16;
    --stone3: #2e2519;
    --gold: #c8962a;
    --gold-light: #f0c060;
    --gold-dim: #7a5a18;
    --red: #c0392b;
    --red-light: #e74c3c;
    --blue: #2980b9;
    --blue-light: #5dade2;
    --green: #27ae60;
    --hp-red: #c0392b;
    --hp-green: #2ecc71;
    --text: #e8d5a3;
    --text-dim: #9a8060;
    --border: #5a4020;
    --highlight: rgba(200,150,42,0.25);
    --attack-range: rgba(192,57,43,0.2);
    --move-range: rgba(41,128,185,0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--stone);
    color: var(--text);
    font-family: 'Crimson Text', Georgia, serif;
    width: 100vw; height: 100vh;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px);
  }

  /* ── SCREENS ── */
  .screen { display: none; width: 100%; height: 100%; align-items: center; justify-content: center; flex-direction: column; }
  .screen.active { display: flex; }

  /* ── WAITING SCREEN ── */
  #screen-wait {
    gap: 24px;
    background: radial-gradient(ellipse at center, #2e2519 0%, #1a1510 70%);
  }
  .game-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 700;
    color: var(--gold-light);
    text-shadow: 0 0 40px rgba(200,150,42,0.5), 0 2px 0 #000;
    letter-spacing: 0.08em;
    text-align: center;
  }
  .game-subtitle {
    font-family: 'Crimson Text', serif;
    font-size: 18px;
    color: var(--text-dim);
    font-style: italic;
    letter-spacing: 0.15em;
  }
  .rune-divider {
    display: flex; align-items: center; gap: 16px;
    color: var(--gold-dim); font-size: 22px;
  }
  .rune-divider::before, .rune-divider::after {
    content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }
  .wait-text {
    font-size: 20px; color: var(--text-dim); font-style: italic;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* Torch flicker */
  .torch { font-size: 36px; animation: flicker 0.15s ease-in-out infinite alternate; }
  @keyframes flicker { from{opacity:0.85;transform:scale(1)} to{opacity:1;transform:scale(1.05)} }
  .torch-row { display: flex; gap: 40px; }

  /* ── GAME SCREEN ── */
  #screen-game {
    flex-direction: column;
    gap: 8px;
    padding: 8px;
  }

  /* Top bar */
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; max-width: 860px;
    padding: 6px 12px;
    background: var(--stone2);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: var(--gold);
  }
  .turn-indicator {
    font-size: 14px; font-weight: 600;
    padding: 3px 12px;
    border: 1px solid var(--gold-dim);
    border-radius: 3px;
    background: rgba(200,150,42,0.1);
    transition: all 0.3s;
  }
  .turn-indicator.your-turn { color: var(--gold-light); border-color: var(--gold); background: rgba(200,150,42,0.2); }
  .turn-indicator.their-turn { color: var(--text-dim); border-color: var(--border); }

  /* Layout: panels + grid */
  .game-layout {
    display: flex; gap: 10px; align-items: flex-start;
  }

  /* Side panels */
  .side-panel {
    width: 160px; min-width: 140px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .panel-title {
    font-family: 'Cinzel', serif; font-size: 11px; font-weight: 600;
    color: var(--gold-dim); letter-spacing: 0.1em;
    text-align: center; padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .unit-card {
    background: var(--stone2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .unit-card:hover { border-color: var(--gold-dim); }
  .unit-card.selected { border-color: var(--gold); background: rgba(200,150,42,0.08); }
  .unit-card.dead { opacity: 0.35; cursor: default; }
  .unit-card.enemy-card { cursor: default; }
  .unit-name { font-family: 'Cinzel', serif; font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .unit-emoji { font-size: 22px; display: block; text-align: center; margin-bottom: 4px; line-height: 1; }
  .hp-bar-wrap { background: #111; border-radius: 2px; height: 5px; margin-bottom: 3px; overflow: hidden; }
  .hp-bar { height: 5px; border-radius: 2px; transition: width 0.4s; background: var(--hp-green); }
  .hp-bar.low { background: var(--hp-red); }
  .unit-stats { font-size: 11px; color: var(--text-dim); display: flex; gap: 6px; }
  .stat { display: flex; align-items: center; gap: 2px; }

  /* Grid */
  .grid-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  #game-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 3px;
    background: var(--stone3);
    border: 2px solid var(--border);
    border-radius: 6px;
    padding: 6px;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 0 30px rgba(0,0,0,0.5);
  }
  .cell {
    width: 72px; height: 72px;
    background: #1e1810;
    border: 1px solid #2a2010;
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    position: relative;
    transition: background 0.15s;
    font-size: 30px;
    user-select: none;
  }
  .cell:hover { background: #252018; }
  .cell.moveable { background: rgba(41,128,185,0.15); border-color: rgba(93,173,226,0.4); cursor: pointer; }
  .cell.moveable:hover { background: rgba(41,128,185,0.28); }
  .cell.attackable { background: rgba(192,57,43,0.18); border-color: rgba(231,76,60,0.5); cursor: pointer; }
  .cell.attackable:hover { background: rgba(192,57,43,0.32); }
  .cell.selected-cell { background: rgba(200,150,42,0.2); border-color: var(--gold); }
  .cell.obstacle { background: #130f0a; cursor: default; }
  .cell-unit { position: relative; display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .cell-hp { width: 36px; height: 3px; background: #111; border-radius: 2px; overflow: hidden; }
  .cell-hp-fill { height: 3px; background: var(--hp-green); border-radius: 2px; transition: width 0.3s; }
  .cell-hp-fill.low { background: var(--hp-red); }
  .cell-owner-ring {
    position: absolute; inset: 2px;
    border-radius: 50%;
    pointer-events: none;
  }
  .cell-unit-emoji { line-height: 1; display: block; }

  /* Action buttons */
  .action-bar {
    display: flex; gap: 6px; justify-content: center; width: 100%;
  }
  .btn {
    font-family: 'Cinzel', serif; font-size: 12px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--stone2);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .btn:hover:not(:disabled) { border-color: var(--gold-dim); color: var(--text); background: rgba(200,150,42,0.1); }
  .btn:disabled { opacity: 0.35; cursor: default; }
  .btn.active { border-color: var(--gold); color: var(--gold-light); background: rgba(200,150,42,0.15); }
  .btn.danger { border-color: #7a2020; }
  .btn.danger:hover:not(:disabled) { border-color: var(--red-light); color: var(--red-light); background: rgba(192,57,43,0.15); }

  /* Log */
  .combat-log {
    width: 160px; min-width: 140px;
    background: var(--stone2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px;
    display: flex; flex-direction: column; gap: 0;
    overflow: hidden;
  }
  .log-title {
    font-family: 'Cinzel', serif; font-size: 11px; font-weight: 600;
    color: var(--gold-dim); letter-spacing: 0.1em;
    padding-bottom: 4px; margin-bottom: 4px;
    border-bottom: 1px solid var(--border);
    text-align: center;
  }
  .log-entries { display: flex; flex-direction: column; gap: 3px; }
  .log-entry { font-size: 11px; color: var(--text-dim); line-height: 1.4; font-style: italic; border-bottom: 1px solid rgba(90,64,32,0.2); padding-bottom: 3px; }
  .log-entry.dmg { color: #e08060; }
  .log-entry.move { color: #60a0c0; }
  .log-entry.sys { color: var(--gold-dim); }

  /* Result overlay */
  #screen-result {
    background: radial-gradient(ellipse at center, #2e2519 0%, #1a1510 70%);
    gap: 20px;
  }
  .result-title { font-family: 'Cinzel', serif; font-size: clamp(32px,6vw,64px); font-weight: 700; text-align: center; }
  .result-title.win { color: var(--gold-light); text-shadow: 0 0 40px rgba(200,150,42,0.6); }
  .result-title.lose { color: #888; }
  .result-sub { font-size: 18px; color: var(--text-dim); font-style: italic; }
  .btn-large {
    font-family: 'Cinzel', serif; font-size: 14px;
    padding: 10px 28px;
    border: 1px solid var(--gold-dim);
    border-radius: 4px;
    background: rgba(200,150,42,0.1);
    color: var(--gold-light);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-large:hover { background: rgba(200,150,42,0.2); border-color: var(--gold); }

  /* Floating damage numbers */
  .dmg-float {
    position: fixed;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 22px;
    color: #ff6040;
    text-shadow: 0 1px 4px #000;
    pointer-events: none;
    animation: floatUp 1.1s ease-out forwards;
    z-index: 999;
  }
  @keyframes floatUp {
    0%   { opacity:1; transform: translateY(0) scale(1); }
    60%  { opacity:1; transform: translateY(-40px) scale(1.2); }
    100% { opacity:0; transform: translateY(-70px) scale(0.8); }
  }

  /* Cell ring colors */
  .ring-player { box-shadow: 0 0 0 2px var(--blue-light); border-radius: 3px; }
  .ring-enemy  { box-shadow: 0 0 0 2px var(--red-light);  border-radius: 3px; }

  /* Responsive */
  @media (max-width: 680px) {
    .cell { width: 54px; height: 54px; font-size: 22px; }
    .side-panel { width: 120px; min-width: 100px; }
    .combat-log { width: 120px; min-width: 100px; }
  }
  @media (max-width: 520px) {
    .game-layout { flex-direction: column; align-items: center; }
    .side-panel { flex-direction: row; width: 100%; }
    .combat-log { width: 100%; }
    .cell { width: 46px; height: 46px; font-size: 18px; }
  }
</style>
</head>
<body>

<!-- WAITING SCREEN -->
<div id="screen-wait" class="screen active">
  <div class="torch-row"><span class="torch">🕯️</span><span class="torch" style="animation-delay:.07s">🕯️</span></div>
  <div class="game-title">Dungeon Grid<br>Tactics</div>
  <div class="game-subtitle">A two-player tactical duel</div>
  <div class="rune-divider">⚔</div>
  <div class="wait-text" id="wait-text">Seeking an opponent...</div>
  <div class="torch-row"><span class="torch" style="animation-delay:.11s">🕯️</span><span class="torch" style="animation-delay:.04s">🕯️</span></div>
</div>

<!-- GAME SCREEN -->
<div id="screen-game" class="screen">
  <div class="top-bar">
    <span id="player-label">You: Blue</span>
    <span class="turn-indicator" id="turn-indicator">Loading...</span>
    <span id="round-label">Round 1</span>
  </div>
  <div class="game-layout">
    <!-- Your units -->
    <div class="side-panel" id="panel-player">
      <div class="panel-title">YOUR PARTY</div>
    </div>

    <!-- Grid + actions -->
    <div class="grid-wrap">
      <div id="game-grid"></div>
      <div class="action-bar">
        <button class="btn" id="btn-move" disabled>Move</button>
        <button class="btn danger" id="btn-attack" disabled>Attack</button>
        <button class="btn" id="btn-endturn" disabled>End Turn</button>
      </div>
    </div>

    <!-- Enemy units -->
    <div class="side-panel" id="panel-enemy">
      <div class="panel-title">ENEMY PARTY</div>
    </div>
  </div>
  <!-- Combat log -->
  <div class="combat-log" id="combat-log-wrap" style="display:none">
    <div class="log-title">Battle Log</div>
    <div class="log-entries" id="log-entries"></div>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="screen-result" class="screen">
  <div class="torch-row"><span class="torch">🕯️</span><span class="torch" style="animation-delay:.07s">🕯️</span></div>
  <div class="result-title" id="result-title">Victory!</div>
  <div class="result-sub" id="result-sub">The dungeon falls silent.</div>
  <div class="torch-row"><span class="torch" style="animation-delay:.11s">🕯️</span><span class="torch" style="animation-delay:.04s">🕯️</span></div>
</div>

<script>
// ══════════════════════════════════════
//  GAME CONSTANTS
// ══════════════════════════════════════
const COLS = 6, ROWS = 6;

const UNIT_DEFS = [
  { id:'warrior', name:'Warrior',  emoji:'⚔️',  hp:24, atk:6, mov:2, range:1 },
  { id:'archer',  name:'Archer',   emoji:'🏹',  hp:16, atk:8, mov:2, range:2 },
  { id:'mage',    name:'Mage',     emoji:'🔮',  hp:12, atk:11, mov:1, range:2 },
];

// Fixed obstacles (indices in flat array)
const OBSTACLES = new Set([7, 14, 21, 28]);

// Starting positions: player blue, enemy red
const BLUE_START = [[0,0],[0,1],[0,2]];  // [row, col]
const RED_START  = [[5,5],[5,4],[5,3]];

// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
let isHost = false;
let myColor = 'blue', enemyColor = 'red';
let myTurn = false;
let round = 1;

// units: { id, name, emoji, hp, maxHp, atk, mov, range, owner, row, col, moved, attacked }
let units = [];
let selectedUnit = null;
let mode = null; // 'move' | 'attack' | null

let gameOver = false;

// ══════════════════════════════════════
//  AUDIO (Web Audio API)
// ══════════════════════════════════════
const AC = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq, type, duration, gain=0.18) {
  try {
    const o = AC.createOscillator();
    const g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(gain, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + duration);
    o.start(); o.stop(AC.currentTime + duration);
  } catch(e){}
}
function sfxMove()   { playTone(320,'triangle',0.12); setTimeout(()=>playTone(440,'triangle',0.1),80); }
function sfxAttack() { playTone(180,'sawtooth',0.08,0.2); setTimeout(()=>playTone(100,'sawtooth',0.15,0.15),60); }
function sfxSelect() { playTone(660,'sine',0.08,0.1); }
function sfxDeath()  { playTone(120,'sawtooth',0.3,0.25); }
function sfxVictory(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.25,0.15),i*130)); }
function sfxDefeat() { [400,300,200,150].forEach((f,i)=>setTimeout(()=>playTone(f,'triangle',0.3,0.12),i*180)); }
function resumeAudio(){ if(AC.state==='suspended') AC.resume(); }

// ══════════════════════════════════════
//  PLATFORM COMMS
// ══════════════════════════════════════
function emit(payload) {
  if (window.parent !== window) {
    window.parent.postMessage(JSON.stringify(payload), '*');
  }
}

window.addEventListener('message', (event) => {
  try {
    const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
    if (data.type === 'START') {
      isHost = data.isHost;
      myColor = isHost ? 'blue' : 'red';
      enemyColor = isHost ? 'red' : 'blue';
      initGame();
    }
    if (data.type === 'GAME_ACTION') {
      handleRemoteAction(data.action);
    }
  } catch(e) {}
});

// Signal ready
emit({ type: 'READY' });

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════
function initGame() {
  units = [];
  UNIT_DEFS.forEach((def, i) => {
    const [br, bc] = BLUE_START[i];
    const [rr, rc] = RED_START[i];
    units.push({ ...def, uid: 'b'+i, owner:'blue', row:br, col:bc, hp:def.hp, maxHp:def.hp, moved:false, attacked:false });
    units.push({ ...def, uid: 'r'+i, owner:'red',  row:rr, col:rc, hp:def.hp, maxHp:def.hp, moved:false, attacked:false });
  });

  myTurn = isHost; // host (blue) goes first
  round = 1;

  showScreen('game');
  buildGrid();
  buildPanels();
  renderAll();
  updateUI();
  addLog('The battle begins!', 'sys');
}

// ══════════════════════════════════════
//  GRID
// ══════════════════════════════════════
function buildGrid() {
  const grid = document.getElementById('game-grid');
  grid.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r; cell.dataset.c = c;
      const idx = r*COLS+c;
      if (OBSTACLES.has(idx)) {
        cell.classList.add('obstacle');
        cell.textContent = '🪨';
      }
      cell.addEventListener('click', () => { resumeAudio(); onCellClick(r, c); });
      grid.appendChild(cell);
    }
  }
}

function getCell(r, c) {
  return document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
}

function renderAll() {
  // Clear all cells of units
  document.querySelectorAll('.cell').forEach(cell => {
    if (!cell.classList.contains('obstacle')) {
      cell.innerHTML = '';
      cell.classList.remove('selected-cell', 'moveable', 'attackable');
    }
  });

  // Place units
  units.forEach(u => {
    if (u.hp <= 0) return;
    const cell = getCell(u.row, u.col);
    if (!cell) return;
    const wrap = document.createElement('div');
    wrap.className = 'cell-unit';
    const ringClass = u.owner === 'blue' ? 'ring-player' : 'ring-enemy';
    wrap.classList.add(ringClass);

    const em = document.createElement('span');
    em.className = 'cell-unit-emoji';
    em.textContent = u.emoji;
    wrap.appendChild(em);

    const hpWrap = document.createElement('div'); hpWrap.className = 'cell-hp';
    const hpFill = document.createElement('div');
    hpFill.className = 'cell-hp-fill' + (u.hp/u.maxHp < 0.4 ? ' low' : '');
    hpFill.style.width = Math.round(u.hp/u.maxHp*100)+'%';
    hpWrap.appendChild(hpFill); wrap.appendChild(hpWrap);
    cell.appendChild(wrap);
  });

  // Highlight selected + ranges
  if (selectedUnit && myTurn) {
    const cell = getCell(selectedUnit.row, selectedUnit.col);
    if (cell) cell.classList.add('selected-cell');

    if (mode === 'move' && !selectedUnit.moved) {
      getMoveTargets(selectedUnit).forEach(([r,c]) => {
        getCell(r,c)?.classList.add('moveable');
      });
    }
    if (mode === 'attack' && !selectedUnit.attacked) {
      getAttackTargets(selectedUnit).forEach(([r,c]) => {
        getCell(r,c)?.classList.add('attackable');
      });
    }
  }
}

function buildPanels() {
  renderPanel('panel-player', myColor);
  renderPanel('panel-enemy', enemyColor);
}

function renderPanel(panelId, color) {
  const panel = document.getElementById(panelId);
  // keep title
  const title = panel.querySelector('.panel-title');
  panel.innerHTML = '';
  panel.appendChild(title);

  units.filter(u => u.owner === color).forEach(u => {
    const card = document.createElement('div');
    card.className = 'unit-card' + (u.hp<=0?' dead':'') + (color===enemyColor?' enemy-card':'');
    card.dataset.uid = u.uid;

    card.innerHTML = `
      <span class="unit-emoji">${u.emoji}</span>
      <div class="unit-name">${u.name}</div>
      <div class="hp-bar-wrap"><div class="hp-bar${u.hp/u.maxHp<0.4?' low':''}" style="width:${Math.round(u.hp/u.maxHp*100)}%"></div></div>
      <div class="unit-stats">
        <span class="stat" title="HP">❤️ ${u.hp}</span>
        <span class="stat" title="ATK">⚔ ${u.atk}</span>
        <span class="stat" title="MOV">👟 ${u.mov}</span>
      </div>
    `;

    if (color === myColor && u.hp > 0) {
      card.addEventListener('click', () => { resumeAudio(); onSelectUnit(u); });
    }
    panel.appendChild(card);
  });
}

// ══════════════════════════════════════
//  RANGE HELPERS
// ══════════════════════════════════════
function getUnitAt(r, c) {
  return units.find(u => u.hp>0 && u.row===r && u.col===c) || null;
}

function inBounds(r, c) { return r>=0&&r<ROWS&&c>=0&&c<COLS; }
function isObstacle(r, c) { return OBSTACLES.has(r*COLS+c); }

function getMoveTargets(u) {
  const results = [];
  const visited = new Set();
  const queue = [[u.row, u.col, 0]];
  visited.add(u.row+','+u.col);
  while (queue.length) {
    const [r, c, dist] = queue.shift();
    if (dist > 0 && !getUnitAt(r,c)) results.push([r,c]);
    if (dist >= u.mov) continue;
    for (const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nr=r+dr, nc=c+dc;
      if (!inBounds(nr,nc)||isObstacle(nr,nc)||visited.has(nr+','+nc)) continue;
      visited.add(nr+','+nc);
      queue.push([nr,nc,dist+1]);
    }
  }
  return results;
}

function getAttackTargets(u) {
  const results = [];
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    const target = getUnitAt(r,c);
    if (!target || target.owner === u.owner) continue;
    const dist = Math.abs(r-u.row)+Math.abs(c-u.col);
    if (dist <= u.range) results.push([r,c]);
  }
  return results;
}

// ══════════════════════════════════════
//  INPUT
// ══════════════════════════════════════
function onSelectUnit(u) {
  if (!myTurn || gameOver) return;
  if (u.owner !== myColor || u.hp <= 0) return;
  selectedUnit = u;
  mode = null;
  sfxSelect();
  renderAll();
  buildPanels();
  highlightCard(u);
  updateActionButtons();
}

function highlightCard(u) {
  document.querySelectorAll('.unit-card').forEach(c => c.classList.remove('selected'));
  const card = document.querySelector(`[data-uid="${u.uid}"]`);
  if (card) card.classList.add('selected');
}

function onCellClick(r, c) {
  if (!myTurn || !selectedUnit || gameOver) return;

  if (mode === 'move') {
    const targets = getMoveTargets(selectedUnit);
    if (targets.some(([tr,tc])=>tr===r&&tc===c)) {
      doMove(selectedUnit, r, c, true);
    }
  } else if (mode === 'attack') {
    const target = getUnitAt(r, c);
    if (target && target.owner !== myColor) {
      const targets = getAttackTargets(selectedUnit);
      if (targets.some(([tr,tc])=>tr===r&&tc===c)) {
        doAttack(selectedUnit, target, true);
      }
    }
  }
}

// ══════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════
function doMove(u, r, c, local) {
  u.row = r; u.col = c; u.moved = true;
  mode = null;
  sfxMove();
  addLog(`${u.name} moved.`, 'move');
  if (local) {
    emit({ type: 'GAME_ACTION', action: { kind:'MOVE', uid: u.uid, r, c } });
  }
  renderAll(); buildPanels(); updateActionButtons();
}

function doAttack(attacker, target, local) {
  const dmg = attacker.atk + Math.floor(Math.random()*4) - 1;
  const actual = Math.max(1, dmg);
  target.hp = Math.max(0, target.hp - actual);
  attacker.attacked = true;
  mode = null;
  sfxAttack();
  showDamageFloat(target.row, target.col, actual);
  addLog(`${attacker.name} hit ${target.name} for ${actual} dmg!`, 'dmg');
  if (local) {
    emit({ type: 'GAME_ACTION', action: { kind:'ATTACK', uid: attacker.uid, targetUid: target.uid, dmg: actual } });
  }
  if (target.hp <= 0) {
    sfxDeath();
    addLog(`${target.name} has fallen!`, 'dmg');
  }
  renderAll(); buildPanels(); updateActionButtons();
  checkWin();
}

function doEndTurn(local) {
  // Reset my units
  units.filter(u=>u.owner===myColor).forEach(u=>{ u.moved=false; u.attacked=false; });
  selectedUnit = null; mode = null;
  myTurn = false;
  round++;
  addLog(`Turn ${round-1} ended.`, 'sys');
  if (local) {
    emit({ type: 'GAME_ACTION', action: { kind:'END_TURN' } });
  }
  renderAll(); buildPanels(); updateUI(); updateActionButtons();
}

// ══════════════════════════════════════
//  REMOTE ACTIONS
// ══════════════════════════════════════
function handleRemoteAction(action) {
  if (action.kind === 'MOVE') {
    const u = units.find(u=>u.uid===action.uid);
    if (u) doMove(u, action.r, action.c, false);
  }
  if (action.kind === 'ATTACK') {
    const attacker = units.find(u=>u.uid===action.uid);
    const target   = units.find(u=>u.uid===action.targetUid);
    if (attacker && target) {
      target.hp = Math.max(0, target.hp - action.dmg);
      attacker.attacked = true;
      sfxAttack();
      showDamageFloat(target.row, target.col, action.dmg);
      addLog(`${attacker.name} hit ${target.name} for ${action.dmg} dmg!`, 'dmg');
      if (target.hp <= 0) { sfxDeath(); addLog(`${target.name} has fallen!`, 'dmg'); }
      renderAll(); buildPanels();
      checkWin();
    }
  }
  if (action.kind === 'END_TURN') {
    units.filter(u=>u.owner===enemyColor).forEach(u=>{ u.moved=false; u.attacked=false; });
    myTurn = true;
    addLog('Your turn!', 'sys');
    renderAll(); buildPanels(); updateUI(); updateActionButtons();
  }
}

// ══════════════════════════════════════
//  WIN CONDITION
// ══════════════════════════════════════
function checkWin() {
  const myAlive = units.filter(u=>u.owner===myColor&&u.hp>0).length;
  const enAlive = units.filter(u=>u.owner===enemyColor&&u.hp>0).length;
  if (myAlive === 0) { endGame(false); return; }
  if (enAlive === 0) { endGame(true); return; }
}

function endGame(won) {
  gameOver = true;
  setTimeout(() => {
    document.getElementById('result-title').textContent = won ? 'Victory!' : 'Defeat';
    document.getElementById('result-title').className = 'result-title ' + (won ? 'win' : 'lose');
    document.getElementById('result-sub').textContent = won
      ? 'The dungeon echoes with your triumph.'
      : 'The darkness claims you.';
    showScreen('result');
    won ? sfxVictory() : sfxDefeat();
  }, 800);
}

// ══════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  if (name === 'game') {
    document.getElementById('combat-log-wrap').style.display = 'none'; // hide until space allows
  }
}

function updateUI() {
  const ti = document.getElementById('turn-indicator');
  ti.textContent = myTurn ? 'YOUR TURN' : 'ENEMY TURN';
  ti.className = 'turn-indicator ' + (myTurn ? 'your-turn' : 'their-turn');
  document.getElementById('round-label').textContent = 'Round '+Math.ceil(round/2);
  const colorName = myColor === 'blue' ? '🔵 Blue' : '🔴 Red';
  document.getElementById('player-label').textContent = 'You: '+colorName;
}

function updateActionButtons() {
  const canAct = myTurn && !gameOver && !!selectedUnit && selectedUnit.hp > 0;
  const btnMove   = document.getElementById('btn-move');
  const btnAtk    = document.getElementById('btn-attack');
  const btnEnd    = document.getElementById('btn-endturn');

  btnMove.disabled   = !canAct || !!selectedUnit?.moved;
  btnAtk.disabled    = !canAct || !!selectedUnit?.attacked;
  btnEnd.disabled    = !myTurn || gameOver;

  btnMove.classList.toggle('active', mode === 'move');
  btnAtk.classList.toggle('active', mode === 'attack');
}

document.getElementById('btn-move').addEventListener('click', () => {
  resumeAudio();
  if (!selectedUnit || selectedUnit.moved) return;
  mode = mode === 'move' ? null : 'move';
  renderAll(); updateActionButtons();
});
document.getElementById('btn-attack').addEventListener('click', () => {
  resumeAudio();
  if (!selectedUnit || selectedUnit.attacked) return;
  mode = mode === 'attack' ? null : 'attack';
  renderAll(); updateActionButtons();
});
document.getElementById('btn-endturn').addEventListener('click', () => {
  resumeAudio();
  if (!myTurn) return;
  doEndTurn(true);
});

// ══════════════════════════════════════
//  FLOATING DAMAGE
// ══════════════════════════════════════
function showDamageFloat(r, c, dmg) {
  const cell = getCell(r, c);
  if (!cell) return;
  const rect = cell.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'dmg-float';
  el.textContent = '-'+dmg;
  el.style.left = (rect.left + rect.width/2 - 15) + 'px';
  el.style.top  = (rect.top - 10) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

// ══════════════════════════════════════
//  COMBAT LOG
// ══════════════════════════════════════
const MAX_LOG = 8;
function addLog(text, type='') {
  const container = document.getElementById('log-entries');
  const entry = document.createElement('div');
  entry.className = 'log-entry' + (type ? ' '+type : '');
  entry.textContent = text;
  container.prepend(entry);
  while (container.children.length > MAX_LOG) {
    container.lastChild.remove();
  }
}

// ══════════════════════════════════════
//  DEV / SOLO TEST (no parent)
// ══════════════════════════════════════
if (window.parent === window) {
  document.getElementById('wait-text').textContent = 'Solo test mode — starting as Host';
  setTimeout(() => {
    isHost = true;
    myColor = 'blue'; enemyColor = 'red';
    initGame();
    addLog('Solo test mode active', 'sys');
  }, 1500);
}
</script>
