<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Tic-Tac-Toe ∞</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050510;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      color: #fff;
    }

    /* ── Waiting Overlay ── */
    #overlay {
      position: fixed; inset: 0;
      background: #050510;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 999;
      transition: opacity 0.5s;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    .loader {
      width: 48px; height: 48px;
      border: 4px solid rgba(0,229,255,0.15);
      border-top-color: #00e5ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #overlay p {
      text-transform: uppercase;
      letter-spacing: 3px;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }

    /* ── HUD ── */
    #hud {
      text-align: center;
      margin-bottom: 20px;
      min-height: 30px;
    }
    #hud span {
      display: inline-block;
      text-transform: uppercase;
      letter-spacing: 5px;
      font-size: 15px;
      font-weight: 900;
    }
    .glow-cyan  { color: #00e5ff; text-shadow: 0 0 12px #00e5ff, 0 0 30px rgba(0,229,255,0.3); }
    .glow-pink  { color: #ff4081; text-shadow: 0 0 12px #ff4081, 0 0 30px rgba(255,64,129,0.3); }
    .glow-dim   { color: #334; }

    /* ── Board ── */
    #board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(3, 120px);
      gap: 6px;
    }
    .cell {
      background: rgba(10,10,30,0.8);
      border: 1px solid rgba(100,120,255,0.12);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
    }
    .cell:hover { background: rgba(20,20,50,0.9); border-color: rgba(100,120,255,0.3); }
    .cell.disabled { pointer-events: none; }

    /* ── Pieces (pure CSS) ── */
    .piece {
      width: 70px; height: 70px;
      position: relative;
      transition: opacity 0.3s;
    }
    .piece.fading { opacity: 0.25; animation: pulse 0.8s ease-in-out infinite; }
    @keyframes pulse { 50% { opacity: 0.45; } }

    /* X piece */
    .piece-x::before, .piece-x::after {
      content: '';
      position: absolute;
      width: 80px; height: 8px;
      background: #00e5ff;
      top: 50%; left: 50%;
      border-radius: 4px;
      box-shadow: 0 0 12px #00e5ff, 0 0 25px rgba(0,229,255,0.4);
    }
    .piece-x::before { transform: translate(-50%,-50%) rotate(45deg); }
    .piece-x::after  { transform: translate(-50%,-50%) rotate(-45deg); }

    /* O piece */
    .piece-o::before {
      content: '';
      position: absolute;
      width: 64px; height: 64px;
      border: 8px solid #ff4081;
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      box-shadow: 0 0 12px #ff4081, 0 0 25px rgba(255,64,129,0.4),
                  inset 0 0 12px rgba(255,64,129,0.2);
    }

    /* ── Win line ── */
    #winline {
      position: absolute;
      height: 6px;
      background: #fff;
      border-radius: 3px;
      box-shadow: 0 0 20px #fff, 0 0 40px #fff;
      transform-origin: 0 50%;
      z-index: 10;
      pointer-events: none;
      display: none;
    }
  </style>
</head>
<body>

  <!-- Waiting overlay -->
  <div id="overlay">
    <div class="loader"></div>
    <p>Synchronizing Void...</p>
  </div>

  <!-- Game -->
  <div id="hud"><span class="glow-dim">WAITING</span></div>
  <div style="position:relative">
    <div id="board"></div>
    <div id="winline"></div>
  </div>

<script>
// ================================================================
//  NEON TIC-TAC-TOE ∞  —  ostl. multiplayer engine
//  Protocol: postMessage JSON strings to/from parent window
//  Messages IN:  { type: 'START', isHost: bool }
//  Messages OUT: { type: 'READY' }
//  Game data:    { type: 'MOVE', index: 0-8 }
// ================================================================

// ── State ──────────────────────────────────────────────────
let board     = [null,null,null,null,null,null,null,null,null];
let xMoves    = [];   // ordered history of X placements
let oMoves    = [];   // ordered history of O placements
let mySymbol  = '';    // 'X' or 'O'
let myTurn    = false;
let started   = false;
let winner    = null;

const MAX_PIECES = 3; // infinite rule: oldest fades after 3

// ── DOM refs ───────────────────────────────────────────────
const hud     = document.getElementById('hud');
const overlay = document.getElementById('overlay');
const boardEl = document.getElementById('board');

// Build cells
const cells = [];
for (let i = 0; i < 9; i++) {
  const cell = document.createElement('div');
  cell.className = 'cell';
  cell.dataset.index = i;
  cell.addEventListener('click', () => onCellClick(i));
  boardEl.appendChild(cell);
  cells.push(cell);
}

// ── Communication with parent (GameWrapper) ────────────────
function sendUp(obj) {
  if (window.parent !== window) {
    window.parent.postMessage(JSON.stringify(obj), '*');
  }
}

// Listen for messages from GameWrapper
window.addEventListener('message', (evt) => {
  let msg;
  try {
    msg = (typeof evt.data === 'string') ? JSON.parse(evt.data) : evt.data;
  } catch (_) { return; }
  if (!msg || !msg.type) return;

  switch (msg.type) {

    case 'START':
      if (started) return;          // ← ignore duplicate START signals
      started  = true;
      mySymbol = (msg.isHost === true) ? 'X' : 'O';
      myTurn   = (msg.isHost === true); // X always goes first
      overlay.classList.add('hidden');
      renderHUD();
      break;

    case 'MOVE':
      if (!started || winner) return;
      receiveMove(msg.index);
      break;
  }
});

// Handshake: keep telling parent we're ready until START arrives
if (window.parent !== window) {
  const hb = setInterval(() => {
    if (started) { clearInterval(hb); return; }
    sendUp({ type: 'READY' });
  }, 800);
}

// ── Click handler ──────────────────────────────────────────
function onCellClick(index) {
  if (!myTurn || !started || winner) return;
  if (board[index] !== null) return;

  // Place locally
  place(index, mySymbol);

  // Notify opponent
  sendUp({ type: 'MOVE', index });

  myTurn = false;
  renderHUD();
  renderBoard();
}

// ── Receive opponent's move ────────────────────────────────
function receiveMove(index) {
  if (index < 0 || index > 8) return;
  const oppSymbol = (mySymbol === 'X') ? 'O' : 'X';

  // Guard: ignore if cell is occupied (desync protection)
  if (board[index] !== null) return;

  place(index, oppSymbol);
  myTurn = true;
  renderHUD();
  renderBoard();
}

// ── Core game logic ────────────────────────────────────────
function place(index, symbol) {
  board[index] = symbol;
  const history = (symbol === 'X') ? xMoves : oMoves;
  history.push(index);

  // Infinite rule: remove oldest if over limit
  if (history.length > MAX_PIECES) {
    const old = history.shift();
    board[old] = null;
  }

  // Check for winner
  const w = checkWin();
  if (w) {
    winner = w.symbol;
    setTimeout(() => drawWinLine(w.line), 100);
  }
}

function checkWin() {
  const lines = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];
  for (const line of lines) {
    const [a,b,c] = line;
    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
      return { symbol: board[a], line };
    }
  }
  return null;
}

// ── Rendering ──────────────────────────────────────────────
function renderBoard() {
  for (let i = 0; i < 9; i++) {
    const cell = cells[i];
    cell.innerHTML = '';
    cell.className = 'cell' + ((!myTurn || winner) ? ' disabled' : '');

    const val = board[i];
    if (!val) continue;

    const piece = document.createElement('div');
    piece.className = 'piece piece-' + val.toLowerCase();

    // Mark the oldest piece (about to be removed) as fading
    const hist = (val === 'X') ? xMoves : oMoves;
    if (hist.length >= MAX_PIECES && hist[0] === i) {
      piece.classList.add('fading');
    }

    cell.appendChild(piece);
  }
}

function renderHUD() {
  if (winner) {
    const isMe = (winner === mySymbol);
    const cls = (winner === 'X') ? 'glow-cyan' : 'glow-pink';
    hud.innerHTML = `<span class="${cls}">${isMe ? '⚡ You Win!' : '💀 You Lose!'}</span>`;
  } else if (myTurn) {
    const cls = (mySymbol === 'X') ? 'glow-cyan' : 'glow-pink';
    hud.innerHTML = `<span class="${cls}">Your Turn · ${mySymbol}</span>`;
  } else {
    hud.innerHTML = `<span class="glow-dim">Opponent Thinking...</span>`;
  }
}

function drawWinLine(line) {
  const el = document.getElementById('winline');
  // Calculate positions from cell centers
  const getCenter = (idx) => {
    const c = cells[idx];
    return {
      x: c.offsetLeft + c.offsetWidth / 2,
      y: c.offsetTop  + c.offsetHeight / 2
    };
  };
  const p1 = getCenter(line[0]);
  const p2 = getCenter(line[2]);
  const dx = p2.x - p1.x;
  const dy = p2.y - p1.y;
  const len = Math.sqrt(dx*dx + dy*dy);
  const angle = Math.atan2(dy, dx) * 180 / Math.PI;

  el.style.display = 'block';
  el.style.width = len + 'px';
  el.style.left  = p1.x + 'px';
  el.style.top   = p1.y + 'px';
  el.style.transform = `rotate(${angle}deg)`;
  el.style.boxShadow = winner === 'X'
    ? '0 0 20px #00e5ff, 0 0 40px #00e5ff'
    : '0 0 20px #ff4081, 0 0 40px #ff4081';
}

// ── Standalone mode (for testing without platform) ─────────
if (window.parent === window) {
  started = true;
  mySymbol = 'X';
  myTurn = true;
  overlay.classList.add('hidden');
  renderHUD();
}
</script>
</body>
</html>
